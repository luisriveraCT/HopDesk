name: R Test Suite

# Report-only: runs on every push to every branch. No branch protection is
# configured against this check — see docs/saas_rebuild/STAGE_6_CI.md.
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'
          use-public-rspm: true

      # Uses pak (via r-lib/actions/setup-r-dependencies) instead of a plain
      # install.packages() step — plain install.packages() left aws.s3
      # uninstalled with no non-zero exit code (a per-package source-compile
      # failure that install.packages() only warns about), which then failed
      # every runner at library(aws.s3) load time. pak resolves Linux binaries
      # from Posit Package Manager and auto-installs any missing system
      # libraries, and fails the step loudly if a package truly can't install.
      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::shiny
            any::shinyjs
            any::bslib
            any::dplyr
            any::tidyr
            any::lubridate
            any::stringr
            any::scales
            any::purrr
            any::DT
            any::shinyWidgets
            any::aws.s3
            any::httr
            any::jsonlite
            any::uuid
            any::readxl
            any::openxlsx
            any::shinymanager
            any::callr
            any::openssl
            any::tibble
            any::stringi

      - name: Run test suite
        id: run_tests
        run: |
          set +e

          declare -a RUNNERS=(
            "tests/_run_saas.R"
            "tests/_run_agenda.R"
            "tests/_run_cart.R"
            "tests/_run_forecasting.R"
            "tests/_run_s1.R"
            "tests/_run_s2.R"
            "tests/_run_s3.R"
            "tests/_run_tag.R"
          )

          # Lines matching this are individual named checks (not the file-level
          # PASS/FAIL tally lines) — every runner in this repo prints one such
          # line per assertion, in one of a few conventions:
          #   "  PASS  label"        / "  FAIL  label" + expected/got lines  (.chk helper)
          #   " PASS: label"         / " FAIL: label"                       (ok helper)
          #   "[PASS] label"         / "[FAIL] label" / "[ERROR] label — msg" (forecasting)
          PASS_RE='^[[:space:]]*(PASS|\[PASS\])'
          FAIL_RE='^[[:space:]]*(FAIL|\[FAIL\]|ERROR|\[ERROR\])'

          OVERALL_STATUS=0
          # Failure detail blocks are buffered separately and appended AFTER the
          # full table below — writing them inline between table rows would
          # split the markdown table and break its rendering on GitHub.
          DETAILS_FILE=$(mktemp)

          {
            echo "## R Test Suite"
            echo ""
            echo "| Runner | Result | Passed | Failed |"
            echo "|---|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          for runner in "${RUNNERS[@]}"; do
            name=$(basename "$runner")
            log=$(mktemp)

            Rscript "$runner" > "$log" 2>&1
            status=$?

            pass_n=$(grep -cE "$PASS_RE" "$log")
            fail_n=$(grep -cE "$FAIL_RE" "$log")

            echo "──────────────────────────────────────────────"
            echo "  $name  (exit $status)"
            echo "──────────────────────────────────────────────"
            cat "$log"
            echo ""

            if [ "$status" -eq 0 ]; then
              result="✅ pass"
            else
              result="❌ FAIL"
              OVERALL_STATUS=1
            fi

            echo "| $name | $result | $pass_n | $fail_n |" >> "$GITHUB_STEP_SUMMARY"

            if [ "$status" -ne 0 ]; then
              {
                echo ""
                echo "<details><summary>❌ <code>$name</code> — exit $status, $fail_n failing check(s)</summary>"
                echo ""
                echo '```'
                if grep -qE "$FAIL_RE" "$log"; then
                  grep -A2 -E "$FAIL_RE" "$log"
                else
                  echo "(no individual FAIL/ERROR line matched — runner likely errored before"
                  echo " printing any test result; last 20 lines of output:)"
                  echo ""
                  tail -n 20 "$log"
                fi
                echo '```'
                echo ""
                echo "</details>"
              } >> "$DETAILS_FILE"
            fi

            rm -f "$log"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat "$DETAILS_FILE" >> "$GITHUB_STEP_SUMMARY"
          rm -f "$DETAILS_FILE"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$OVERALL_STATUS" -eq 0 ]; then
            echo "All runners passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**One or more runners failed — see details above.**" >> "$GITHUB_STEP_SUMMARY"
          fi

          exit $OVERALL_STATUS
